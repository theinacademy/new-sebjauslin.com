media:
  input: assets
  output: /assets

components:
  link:
    type: object
    fields:
      - name: text
        label: Text
        type: string
      - name: href
        label: URL
        type: string
      - name: showArrow
        label: Show arrow
        type: boolean

  image:
    type: object
    fields:
      - name: src
        label: Image
        type: image
      - name: alt
        label: Alt text
        type: string

content:
  - name: site
    label: Website Content
    type: file
    path: content/site.json
    format: json
    fields:
      - name: seo
        label: SEO
        type: object
        fields:
          - name: title
            label: Browser title
            type: string
          - name: description
            label: Meta description
            type: text

      - name: nav
        label: Header Navigation
        type: object
        fields:
          - name: links
            label: Menu links
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label}"
            fields:
              - name: label
                label: Label
                type: string
              - name: href
                label: Anchor or URL
                type: string
          - name: cta
            label: Header CTA
            component: link

      - name: hero
        label: Hero
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            label: Headline HTML
            type: text
            description: Keep <br> for line breaks and <em class="gradient-text">...</em> for the red italic emphasis.
          - name: subtitle
            label: Intro copy
            type: text
          - name: support
            label: Supporting line
            type: text
          - name: proof
            label: Proof badges
            type: string
            list: true
          - name: cta
            label: Hero CTA
            component: link

      - name: cost
        label: Cost of Inaction
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            label: Headline
            type: text
          - name: intro
            label: Intro paragraphs
            type: text
            list: true
          - name: stats
            label: Statistics
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{value}"
            fields:
              - name: value
                label: Stat value
                type: string
              - name: label
                label: Stat label
                type: text
          - name: truth
            label: Closing statement
            type: text

      - name: method
        label: Method
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            label: Headline
            type: text
          - name: intro
            label: Intro paragraphs
            type: text
            list: true
          - name: quote
            label: Quote
            type: text
          - name: quoteAttr
            label: Quote attribution
            type: string
          - name: architecture
            label: BE > DO > HAVE Architecture
            type: object
            fields:
              - name: headline
                type: string
              - name: intro
                type: text
              - name: body
                type: text
          - name: stages
            label: Method stages
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{name} — {label}"
            fields:
              - name: name
                type: string
              - name: label
                type: string
              - name: headline
                type: string
              - name: body
                type: text
              - name: coaching
                label: 1:1 coaching copy
                type: text
              - name: workshop
                label: Workshop copy
                type: text
              - name: image
                component: image

      - name: proof
        label: Proof Section
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            type: text

      - name: caseStudies
        label: Case Studies
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            type: string
          - name: meta
            label: Meta line
            type: string
          - name: situation
            type: text
          - name: intervention
            type: text
          - name: outcome
            label: Outcomes
            type: string
            list: true
          - name: roi
            label: ROI copy
            type: text
          - name: quote
            type: text
          - name: person
            label: Person
            type: string
          - name: role
            type: string
          - name: avatar
            label: Avatar
            type: image

      - name: pullQuotes
        label: Pull Quotes
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{person}"
        fields:
          - name: quote
            type: text
          - name: person
            type: string
          - name: role
            type: string
          - name: avatar
            type: image

      - name: offer
        label: Offer Section
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            type: text
          - name: note
            type: text

      - name: offers
        label: Offers
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: audience
            type: string
          - name: title
            type: string
          - name: body
            type: text
          - name: bullets
            type: string
            list: true

      - name: whySeb
        label: Why Seb
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            type: text
          - name: body
            label: Body paragraphs
            type: text
            list: true
          - name: credentials
            type: string
            list: true
          - name: cities
            type: string
          - name: image
            component: image
          - name: forbes
            label: Forbes Feature
            type: object
            fields:
              - name: headline
                type: text
              - name: meta
                type: string
              - name: href
                label: Article URL
                type: string
              - name: image
                label: Feature image
                type: image

      - name: cta
        label: Final CTA
        type: object
        fields:
          - name: kicker
            label: Eyebrow
            type: string
          - name: headline
            type: text
          - name: subtitle
            type: text
          - name: line
            label: Emphasis line
            type: string
          - name: button
            component: link
          - name: quote
            label: Quote HTML
            type: text
          - name: attr
            label: Attribution
            type: string

      - name: footer
        label: Footer
        type: object
        fields:
          - name: tagline
            type: text
          - name: navLabel
            label: Navigation label
            type: string
          - name: locationsLabel
            label: Locations label
            type: string
          - name: cities
            label: Cities HTML
            type: text
          - name: email
            type: string
          - name: copy
            label: Copyright line
            type: string
          - name: meta
            label: Credential line
            type: string
